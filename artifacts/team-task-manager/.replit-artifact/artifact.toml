kind = "web"
previewPath = "/"
title = "Team Task Manager"
version = "1.0.0"
id = "artifacts/team-task-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18739

[services.development]
run = "pnpm --filter @workspace/team-task-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/team-task-manager", "run", "build" ]
publicDir = "artifacts/team-task-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18739"
BASE_PATH = "/"
